<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termék – Kincsem Faműhely</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">Kincsem Faműhely</a>
    </div>
  </header>

  <main class="container product-page">

    <div class="product-layout">

      <div class="product-image-wrapper">
        <img id="product-image" src="" alt="Termékkép">
      </div>

      <div class="product-details">
        <h1 id="product-name"></h1>
        <p id="product-price" class="price"></p>
        <p id="product-description" class="description"></p>

        <button id="buy-button" class="buy-button">Megvásárolom</button>
      </div>

    </div>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2024 Kincsem Faműhely – Minden jog fenntartva</p>
    </div>
  </footer>

  <script src="product.js"></script>
</body>
</html>
